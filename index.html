<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="随机城市抽选小游戏集合：轮盘、飞镖、老虎机、卡牌，让命运决定你的下一站旅行目的地。" />
  <title>下一站 · 随机城市</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 背景渐变光斑 -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header class="nav glass">
    <div class="brand">🎲 随机城市</div>
    <div class="nav-pool" id="nav-pool"></div>
  </header>

  <main>
    <section class="hero">
      <h1>下一站，去哪儿？</h1>
      <p>勾选城市分组，挑一个小游戏，让命运决定你的下一站。</p>
    </section>

    <section class="card glass section-groups" aria-label="城市分组">
      <div class="section-head">
        <h2>🌍 城市分组</h2>
        <span class="pool-count" id="pool-count"></span>
      </div>
      <div class="chips" id="group-chips"></div>
    </section>

    <section class="section-games" aria-label="抽选游戏">
      <div class="segmented" id="game-tabs" role="tablist"></div>
      <div class="card glass game-stage" id="game-stage"></div>
    </section>

    <section class="card glass section-history" id="history-section" hidden>
      <div class="section-head">
        <h2>🕰 抽选历史</h2>
        <button class="text-btn" id="clear-history">清空</button>
      </div>
      <div class="history-list" id="history-list"></div>
    </section>
  </main>

  <footer>
    <p>RandomCity · 纯前端静态页面，数据内置，离线可用</p>
  </footer>

  <div id="modal-root"></div>
  <canvas id="confetti-canvas" aria-hidden="true"></canvas>
  <div class="toast" id="toast" role="status"></div>

  <script src="data/cities.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/city-card.js"></script>
  <script src="js/games/wheel.js"></script>
  <script src="js/games/dart.js"></script>
  <script src="js/games/slot.js"></script>
  <script src="js/games/cards.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
